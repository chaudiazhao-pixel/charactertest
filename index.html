<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的恋爱风格更像哪个电影人物？</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #fff;
  color: #1a1a1a;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* ── Pages ── */
.page { display: none; min-height: 100vh; flex-direction: column; }
.page.active { display: flex; }

/* ── Landing ── */
#landing {
  align-items: center;
  justify-content: center;
  padding: 60px 32px;
  text-align: center;
  gap: 0;
}

.landing-tag {
  display: inline-block;
  background: #f0f0f0;
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 13px;
  color: #666;
  margin-bottom: 28px;
  letter-spacing: 0.5px;
}

.landing-title {
  font-size: 30px;
  font-weight: 900;
  line-height: 1.35;
  letter-spacing: -0.5px;
  margin-bottom: 16px;
}

.landing-subtitle {
  font-size: 15px;
  color: #888;
  line-height: 1.7;
  margin-bottom: 52px;
}

.landing-chars {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 52px;
}

.landing-char-pill {
  background: #f7f7f7;
  border-radius: 100px;
  padding: 8px 16px;
  font-size: 14px;
  color: #333;
}

.btn-primary {
  background: #1a1a1a;
  color: #fff;
  border: none;
  border-radius: 100px;
  padding: 18px 0;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
  max-width: 300px;
  letter-spacing: 0.3px;
  transition: transform 0.1s;
}
.btn-primary:active { transform: scale(0.97); }

/* ── Quiz ── */
#quiz { background: #fff; }

.quiz-header {
  padding: 20px 24px 0;
  display: flex;
  align-items: center;
  gap: 14px;
}

.q-counter {
  font-size: 13px;
  color: #bbb;
  font-weight: 600;
  white-space: nowrap;
  min-width: 36px;
}

.progress-bar {
  flex: 1;
  height: 3px;
  background: #f0f0f0;
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: #1a1a1a;
  border-radius: 2px;
  transition: width 0.35s cubic-bezier(.4,0,.2,1);
}

.quiz-body {
  padding: 36px 24px 32px;
  flex: 1;
}

.question-text {
  font-size: 20px;
  font-weight: 800;
  line-height: 1.55;
  margin-bottom: 28px;
  letter-spacing: -0.3px;
  min-height: 80px;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option {
  background: #f7f7f7;
  border: 2px solid transparent;
  border-radius: 16px;
  padding: 15px 18px;
  font-size: 15px;
  line-height: 1.55;
  cursor: pointer;
  text-align: left;
  color: #1a1a1a;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  font-family: inherit;
  width: 100%;
}
.option:active { transform: scale(0.98); }
.option.selected {
  background: #1a1a1a;
  color: #fff;
  border-color: #1a1a1a;
}
.option:disabled { cursor: default; }

/* ── Result ── */
#result { background: #fff; transition: background 0.4s; }

.result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px;
  font-size: 13px;
  color: #bbb;
}

.result-hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 24px 32px;
  text-align: center;
}

.char-img-wrap {
  width: 160px;
  height: 160px;
  background: #f5f5f5;
  border-radius: 32px;
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.char-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  display: none;
}

.char-img-wrap img.loaded { display: block; }

.char-emoji-fallback {
  font-size: 72px;
  line-height: 1;
  user-select: none;
}

.result-eyebrow {
  font-size: 13px;
  color: #bbb;
  margin-bottom: 8px;
  letter-spacing: 0.3px;
}

.result-name {
  font-size: 34px;
  font-weight: 900;
  letter-spacing: -0.8px;
  line-height: 1.15;
  margin-bottom: 6px;
}

.result-source {
  font-size: 13px;
  color: #bbb;
}

.result-body {
  padding: 0 24px 40px;
}

.divider {
  height: 1px;
  background: #f0f0f0;
  margin-bottom: 24px;
}

.quote-card {
  background: #f7f7f7;
  border-radius: 20px;
  padding: 22px 20px 20px 20px;
  margin-bottom: 28px;
  position: relative;
}

.quote-mark {
  font-size: 48px;
  color: #e0e0e0;
  position: absolute;
  top: 6px;
  left: 16px;
  line-height: 1;
  font-family: Georgia, serif;
  user-select: none;
}

.quote-text {
  font-size: 16px;
  line-height: 1.65;
  color: #333;
  padding-top: 18px;
}

.section-label {
  font-size: 12px;
  color: #bbb;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 28px;
}

.tag {
  background: #f0f0f0;
  border-radius: 100px;
  padding: 7px 15px;
  font-size: 14px;
  color: #444;
}

.description {
  font-size: 15px;
  line-height: 1.85;
  color: #555;
  margin-bottom: 36px;
}

.action-buttons {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.btn-share {
  background: #1a1a1a;
  color: #fff;
  border: none;
  border-radius: 100px;
  padding: 17px 0;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
  font-family: inherit;
  transition: transform 0.1s;
}
.btn-share:active { transform: scale(0.97); }

.btn-retry {
  background: transparent;
  color: #1a1a1a;
  border: 2px solid #e8e8e8;
  border-radius: 100px;
  padding: 15px 0;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  font-family: inherit;
  transition: transform 0.1s;
}
.btn-retry:active { transform: scale(0.97); }

/* ── Rocky Dark Theme ── */
.rocky-mode { background: #07071a !important; }
.rocky-mode .result-header { color: #4a4a7a; }
.rocky-mode .result-eyebrow { color: #4a4a7a; }
.rocky-mode .result-name { color: #e8e8ff; }
.rocky-mode .result-source { color: #4a4a7a; }
.rocky-mode .char-img-wrap { background: #12122e; }
.rocky-mode .divider { background: #1a1a40; }
.rocky-mode .quote-card { background: #0f0f2e; }
.rocky-mode .quote-mark { color: #1e1e50; }
.rocky-mode .quote-text { color: #9090c0; }
.rocky-mode .section-label { color: #4a4a7a; }
.rocky-mode .tag { background: #12122e; color: #7070a0; }
.rocky-mode .description { color: #7070a0; }
.rocky-mode .btn-share { background: #3030a0; }
.rocky-mode .btn-retry { border-color: #1e1e50; color: #7070a0; }

/* Stars effect for Rocky */
.stars {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}
.rocky-mode .stars { display: block; }
.result-header, .result-hero, .result-body { position: relative; z-index: 1; }

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #fff;
  border-radius: 50%;
  opacity: 0;
  animation: twinkle var(--dur) var(--delay) infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0; }
  50% { opacity: var(--bright); }
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: #1a1a1a;
  color: #fff;
  padding: 12px 22px;
  border-radius: 100px;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 999;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Fade transition ── */
.fade-out { animation: fadeOut 0.18s ease forwards; }
.fade-in  { animation: fadeIn  0.22s ease forwards; }
@keyframes fadeOut { to { opacity: 0; transform: translateY(-6px); } }
@keyframes fadeIn  { from { opacity: 0; transform: translateY(6px); } }
</style>
</head>

<!-- ══ LANDING ══ -->
<div id="landing" class="page active">
  <span class="landing-tag">🎬 10题 · 结果即刻揭晓</span>

<script>
// ══ DATA ══

const questions = [
  {
    text: "你喜欢的人发了条动态，底下陌生人狂发❤️❤️❤️。你：",
    options: [

      { text: "一声没吭，离开，三天后说「没事」", char: "Joel" },

      { text: "面不改色，心里开始记账", char: "Nate" }
    ]
  },
  {
    text: "TA发了条「在吗」，然后三分钟没说话。你：",

      { text: "盯着手机，已经想了五个版本", char: "Cassie" },

    quote: "我们不一样，但我们懂对方。",
    tags: ["跨越边界", "用行动沟通", "独一无二", "🌌 隐藏结果"],
    desc: "你找到了这个隐藏结果。Rocky来自另一个星球，和人类没有共同语言——但他们找到了彼此。你在感情里也是这样：不按常理出牌，但你找到的连接是真实的、深刻的。别人可能不懂，但你们自己懂。",
    special: true
  }
};

// ══ STATE ══
let currentQ = 0;
let scores = {};
let currentResult = null;

// ══ FLOW ══
function startQuiz() {
  scores = { Yimei:0, Elphaba:0, Xiezheng:0, Mario:0, Cassie:0, Nate:0, Joel:0 };
  currentQ = 0;
  showPage('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const total = questions.length;

  document.getElementById('q-counter').textContent = `${currentQ + 1}/${total}`;
  document.getElementById('progress-fill').style.width = `${((currentQ + 1) / total) * 100}%`;

  const qtEl = document.getElementById('question-text');
  const optsEl = document.getElementById('options');

  qtEl.classList.add('fade-in');
  setTimeout(() => qtEl.classList.remove('fade-in'), 300);

  qtEl.textContent = q.text;
  optsEl.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt.text;
    btn.onclick = () => pick(i, opt.char, optsEl.querySelectorAll('.option'));
    optsEl.appendChild(btn);
  });
}

function pick(index, char, btns) {
  btns.forEach(b => { b.disabled = true; b.onclick = null; });
  btns[index].classList.add('selected');

  if (char === 'Rocky') {
    setTimeout(() => showResult('Rocky'), 380);
    return;
  }

  if (scores[char] !== undefined) scores[char]++;

  setTimeout(() => {
    currentQ++;
    if (currentQ >= questions.length) {
      showResult(getWinner());
    } else {
      renderQuestion();
    }
  }, 380);
}

function getWinner() {
  return Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
}

function showResult(key) {
  currentResult = key;
  const c = characters[key];
  const resultEl = document.getElementById('result');

  if (c.special) {
    resultEl.classList.add('rocky-mode');
    generateStars();
  } else {
    resultEl.classList.remove('rocky-mode');
    document.getElementById('stars').innerHTML = '';
  }

  const today = new Date();
  document.getElementById('r-date').textContent =
    `${today.getMonth() + 1}月${today.getDate()}日`;

  // Image with auto background color sampling
  const wrap = document.getElementById('char-img-wrap');
  const img = document.getElementById('char-img');
  const emoji = document.getElementById('char-emoji');

  wrap.style.background = c.bg || '#f5f5f5';
  img.classList.remove('loaded');
  emoji.textContent = c.emoji;
  emoji.style.display = '';

  img.onload = function() {
    this.classList.add('loaded');
    emoji.style.display = 'none';
    try {
      const cv = document.createElement('canvas');
      const w = this.naturalWidth, h = this.naturalHeight;
      cv.width = w; cv.height = h;
      const ctx = cv.getContext('2d');
      ctx.drawImage(this, 0, 0);
      const corners = [
        ctx.getImageData(0, 0, 1, 1).data,
        ctx.getImageData(w-1, 0, 1, 1).data,
        ctx.getImageData(0, h-1, 1, 1).data,
        ctx.getImageData(w-1, h-1, 1, 1).data
      ];
      const r = Math.round(corners.reduce((s,c)=>s+c[0],0)/4);
      const g = Math.round(corners.reduce((s,c)=>s+c[1],0)/4);
      const b = Math.round(corners.reduce((s,c)=>s+c[2],0)/4);
      wrap.style.background = `rgb(${r},${g},${b})`;
    } catch(e) {}
  };
  img.onerror = function() { emoji.style.display = ''; };
  img.src = c.img;

  document.getElementById('r-name').textContent = c.name;
  document.getElementById('r-source').textContent = c.source;
  document.getElementById('r-quote').textContent = c.quote;
  document.getElementById('r-desc').textContent = c.desc;

  const tagsEl = document.getElementById('r-tags');
  tagsEl.innerHTML = c.tags.map(t => `<span class="tag">${t}</span>`).join('');

  showPage('result');
}

function retryQuiz() { startQuiz(); }

// ══ SHARE ══
function shareResult() {
  const c = characters[currentResult];
  const text = `我测出来的恋爱风格是「${c.name}」${c.emoji}\n\n${c.quote}\n\n来测测你是哪个电影人物 👇`;
  const url = location.href;

  if (navigator.share) {
    navigator.share({ title: '你的恋爱风格测试', text, url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text + '\n' + url)
      .then(() => toast('已复制到剪贴板 ✓'))
      .catch(() => toast('长按复制链接分享给朋友'));
  }
}

// ══ UTILS ══
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function generateStars() {
  const container = document.getElementById('stars');
  container.innerHTML = '';
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      --dur: ${2 + Math.random() * 4}s;
      --delay: ${Math.random() * 4}s;
      --bright: ${0.3 + Math.random() * 0.7};
    `;
    container.appendChild(s);
  }
}
</script>
